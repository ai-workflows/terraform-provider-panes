name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -v ./...

      - name: Unit Tests
        run: go test -v -short ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  # Acceptance tests run against a real Panes API.
  # Only runs on main branch pushes with secrets configured.
  acceptance:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [build, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Acceptance Tests
        env:
          TF_ACC: "1"
          PANES_TOKEN: ${{ secrets.PANES_TOKEN }}
          PANES_API_URL: ${{ secrets.PANES_API_URL }}
        run: go test -v -timeout 30m ./internal/provider/
